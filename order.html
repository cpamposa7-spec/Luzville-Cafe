<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History – Luzville POS</title>

<link rel="stylesheet" href="dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; }

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 30px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.topbar h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.topbar-meta { display: flex; align-items: center; gap: 16px; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #4ade80;
  font-family: 'DM Mono', monospace;
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.2);
  padding: 4px 10px;
  border-radius: 20px;
}
.live-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.order-count { font-size: 13px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 30px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: white;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: rgba(255,255,255,0.2); }
.search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.4; }

.filter-chips { display: flex; gap: 6px; }
.chip {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.5);
  transition: all 0.15s;
}
.chip:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }
.chip.active { background: white; color: #111; border-color: white; }

/* ── CONTENT ── */
.content {
  padding: 24px 30px;
  overflow-y: auto;
  height: calc(100vh - 160px);
}

/* ── ORDER CARDS ── */
.order-list { display: flex; flex-direction: column; gap: 10px; }

.order-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.order-card:hover { border-color: rgba(255,255,255,0.14); }

.order-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.order-left { display: flex; align-items: center; gap: 14px; }
.order-id {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  min-width: 60px;
}
.order-info h4 { font-size: 14px; font-weight: 500; color: white; margin-bottom: 2px; }
.order-info small { font-size: 11px; color: rgba(255,255,255,0.35); font-family: 'DM Mono', monospace; }

.order-right { display: flex; align-items: center; gap: 14px; }

.status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-paid {
  background: rgba(74,222,128,0.12);
  color: #4ade80;
  border: 1px solid rgba(74,222,128,0.2);
}
.status-pending {
  background: rgba(251,191,36,0.12);
  color: #fbbf24;
  border: 1px solid rgba(251,191,36,0.2);
}

.order-total {
  font-size: 16px;
  font-weight: 600;
  color: white;
  font-family: 'DM Mono', monospace;
  min-width: 80px;
  text-align: right;
}
.expand-icon { font-size: 12px; color: rgba(255,255,255,0.3); transition: transform 0.2s; }
.order-card.expanded .expand-icon { transform: rotate(180deg); }

/* ── ITEMS DROPDOWN ── */
.order-items {
  display: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 12px 18px 16px;
  background: rgba(0,0,0,0.15);
}
.order-card.expanded .order-items { display: block; }

.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.item-row:last-child { border-bottom: none; }
.item-name { flex: 1; }
.item-qty { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.35); margin: 0 20px; }
.item-price { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.7); }

/* ── STATUS CONTROLS ── */
.status-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.status-label {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  margin-right: 4px;
}
.status-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  opacity: 0.5;
}
.status-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.status-btn.active { opacity: 1; }

.btn-pending {
  background: rgba(251,191,36,0.12);
  color: #fbbf24;
  border-color: rgba(251,191,36,0.3);
}
.btn-pending.active {
  background: rgba(251,191,36,0.25);
  border-color: #fbbf24;
}
.btn-paid {
  background: rgba(74,222,128,0.12);
  color: #4ade80;
  border-color: rgba(74,222,128,0.3);
}
.btn-paid.active {
  background: rgba(74,222,128,0.25);
  border-color: #4ade80;
}

.updating-msg {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  font-family: 'DM Mono', monospace;
  margin-left: 8px;
  display: none;
}

/* ── EMPTY / LOADING ── */
.empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }

/* ── SIDEBAR ── */
.sidebar { display: flex; flex-direction: column; height: 100vh; }
.sidebar nav { flex: 1; }
.logout-btn {
  margin: 20px;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
  color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
}

  /* ================= RESPONSIVE FIXES ================= */

*{
box-sizing:border-box;
}

html,
body{
width:100%;
overflow-x:hidden;
}

/* APP LAYOUT */
.app{
display:flex;
min-height:100vh;
}

/* MAIN */
.main{
flex:1;
width:100%;
overflow-x:hidden;
}

/* CONTENT */
.content{
width:100%;
overflow-x:hidden;
}

/* ORDER ROWS */
.order-top{
gap:14px;
}

.order-left,
.order-right{
min-width:0;
}

.order-info h4,
.item-name{
word-break:break-word;
}

/* ================= TABLET ================= */

@media (max-width: 992px){

.sidebar{
width:220px;
min-width:220px;
}

.content{
padding:20px;
}

}

/* ================= MOBILE ================= */

body{

}

.app{

}

/* SIDEBAR */
.sidebar{
width:100%;
height:auto;
position:relative;
padding-bottom:10px;
}

.sidebar h2{

}

.sidebar nav{
display:flex;
gap:10px;
overflow-x:auto;
padding:0 10px 10px;
}

.sidebar nav a{

}

flex-direction:column;
align-items:flex-start;
gap:12px;

}

.topbar h1{
font-size:20px;

.topbar-meta{

justify-content:space-between;
flex-wrap:wrap;
gap:10px;

/* FILTER BAR */

/* ================= SMALL MOBILE ================= */

@media (max-width: 480px){

}

}

}

}

.order-items{

}

}

}

</style>
</head>

<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h2>☕ Luzville POS</h2>
  <nav>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a class="active" href="order.html">📦 Orders</a>
    <a href="sales.html">💰 Sales</a>
  </nav>
 
</aside>

<!-- MAIN -->
<main class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <h1>📦 Order History</h1>
    <div class="topbar-meta">
      <span class="order-count" id="orderCount">— orders</span>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by order ID or amount..." oninput="renderOrders()">
    </div>
    <div class="filter-chips">
      <button class="chip active" onclick="setFilter('all', this)">All</button>
      <button class="chip" onclick="setFilter('paid', this)">Paid</button>
      <button class="chip" onclick="setFilter('pending', this)">Pending</button>
    </div>
  </div>

  <!-- ORDER LIST -->
  <div class="content">
    <div id="orderList" class="order-list">
      <div class="loading">Loading orders...</div>
    </div>
  </div>

</main>
</div>

<script>

const API = "http://localhost:3000";
let allOrders = [];
let activeFilter = "all";

/* LOGOUT */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

/* FILTER */
function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderOrders();
}

/* TOGGLE EXPAND */
function toggleCard(id) {
  const card = document.getElementById("card-" + id);
  card.classList.toggle("expanded");
}

/* UPDATE STATUS */
async function updateStatus(orderId, newStatus, btnEl) {

  const card = document.getElementById("card-" + orderId);
  const msg = card.querySelector(".updating-msg");
  msg.style.display = "inline";

  try {
    const res = await fetch(`${API}/orders/${orderId}/status`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ payment_status: newStatus })
    });

    if (!res.ok) {
      const err = await res.json();
      alert("Error: " + (err.error || "Could not update status"));
      msg.style.display = "none";
      return;
    }

    // Update local data
    const order = allOrders.find(o => o.id === orderId);
    if (order) order.payment_status = newStatus;

    // Update badge in header
    const badge = card.querySelector(".status-badge");
    if (newStatus === "paid") {
      badge.className = "status-badge status-paid";
      badge.textContent = "✓ Paid";
    } else {
      badge.className = "status-badge status-pending";
      badge.textContent = "⏳ Pending";
    }

    // Update buttons active state
    const btns = card.querySelectorAll(".status-btn");
    btns.forEach(b => {
      b.classList.remove("active");
      if (b.dataset.status === newStatus) b.classList.add("active");
    });

    msg.style.display = "none";

  } catch (err) {
    alert("Server error. Is the server running?");
    msg.style.display = "none";
  }
}

/* RENDER ORDERS */
function renderOrders() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const container = document.getElementById("orderList");

  let filtered = allOrders.filter(o => {
    const matchFilter = activeFilter === "all" || o.payment_status === activeFilter;
    const matchSearch =
      String(o.id).includes(search) ||
      String(o.total).includes(search);
    return matchFilter && matchSearch;
  });

  document.getElementById("orderCount").textContent =
    `${filtered.length} order${filtered.length !== 1 ? "s" : ""}`;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>No orders found</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(o => {

    let items = [];
    try { items = JSON.parse(o.items) || []; } catch { items = []; }

    const date = new Date(o.created_at).toLocaleString("en-PH", {
      month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit", hour12: true
    });

    const isPaid = o.payment_status === "paid";
    const statusClass = isPaid ? "status-paid" : "status-pending";
    const statusLabel = isPaid ? "✓ Paid" : "⏳ Pending";

    const itemsHtml = items.length
      ? items.map(i => `
          <div class="item-row">
            <span class="item-name">${i.name || i.item_name || "Item"}</span>
            <span class="item-qty">× ${i.qty}</span>
            <span class="item-price">₱${(i.qty * i.price).toFixed(2)}</span>
          </div>`).join("")
      : `<div style="color:rgba(255,255,255,0.3);font-size:13px;">No item details</div>`;

    return `
      <div class="order-card" id="card-${o.id}">

        <!-- HEADER ROW -->
        <div class="order-top" onclick="toggleCard(${o.id})">
          <div class="order-left">
            <span class="order-id">#${o.id}</span>
            <div class="order-info">
              <h4>${items.length} item${items.length !== 1 ? "s" : ""}</h4>
              <small>${date}</small>
            </div>
          </div>
          <div class="order-right">
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            <span class="order-total">₱${Number(o.total).toFixed(2)}</span>
            <span class="expand-icon">▼</span>
          </div>
        </div>

        <!-- EXPANDED DETAILS -->
        <div class="order-items">
          ${itemsHtml}

          <!-- STATUS CONTROLS -->
          <div class="status-controls">
            <span class="status-label">Set status:</span>

            <button
              class="status-btn btn-pending ${!isPaid ? "active" : ""}"
              data-status="pending"
              onclick="updateStatus(${o.id}, 'pending', this)">
              ⏳ Pending
            </button>

            <button
              class="status-btn btn-paid ${isPaid ? "active" : ""}"
              data-status="paid"
              onclick="updateStatus(${o.id}, 'paid', this)">
              ✓ Mark as Paid
            </button>

            <span class="updating-msg">Saving...</span>
          </div>
        </div>

      </div>`;
  }).join("");
}

/* LOAD ORDERS */
async function loadOrders() {
  try {
    const res = await fetch(`${API}/orders`);
    allOrders = await res.json();
    renderOrders();
  } catch (err) {
    document.getElementById("orderList").innerHTML =
      `<div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Failed to load orders. Is the server running?</p>
      </div>`;
  }
}

/* INIT */
loadOrders();
setInterval(loadOrders, 5000);

</script>
</body>
</html>
