  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Analytics</title>

  <link rel="stylesheet" href="admin.css">

  <!-- CHART JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

  /* ================= CHART ================= */
  .chart-container{
    width:100%;
    height:400px;
    position:relative;
  }

  canvas{
    width:100% !important;
    height:100% !important;
  }

  /* ================= SUMMARY CARDS ================= */
  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
  }

  .stat-card{
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
  }

  .stat-card h3{
    font-size:18px;
    margin-bottom:10px;
  }

  .stat-card p{
    font-size:28px;
    font-weight:bold;
    color:#fbbf24;
  }

  </style>

  </head>

  <body>

  <div class="layout">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

      <div>

        <div class="brand">
          ☕ Luzville Café
        </div>

        <nav>
          <a href="admin.html">🏠 Dashboard</a>
          <a href="users.html">👥 Users</a>
          <a href="orders.html">📦 Orders</a>
          <a href="adminmenu.html">🍽 Menu</a>
          <a class="active" href="analytics.html">📊 Analytics</a>
        </nav>

      </div>


    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">

      <!-- TOPBAR -->
      <div class="topbar">

        <div>
          <h1>Analytics</h1>
          <p>Sales performance overview</p>
        </div>

        <div class="status">
          <span class="dot"></span>
          Live Data
        </div>

      </div>

      <!-- ================= SALES SUMMARY ================= -->
      <div class="stats">

        <div class="stat-card">
          <h3>Total Sales</h3>
          <p id="totalSales">₱0</p>
        </div>

        <div class="stat-card">
          <h3>Weekly Sales</h3>
          <p id="weeklySales">₱0</p>
        </div>

        <div class="stat-card">
          <h3>Monthly Sales</h3>
          <p id="monthlySales">₱0</p>
        </div>

        <div class="stat-card">
          <h3>Paid Orders</h3>
          <p id="totalOrders">0</p>
        </div>

      </div>

      <!-- ================= CHART CARD ================= -->
      <div class="card animate">

        <h2>📊 Real Daily Sales Report</h2>

        <div class="chart-container">
          <canvas id="chart"></canvas>
        </div>

      </div>

    </main>

  </div>

  <script>

  const API = "http://localhost:3000";

  // ================= LOAD ANALYTICS =================
  async function loadAnalytics() {

    try {

      // ================= SALES SUMMARY =================
      const summaryRes = await fetch(`${API}/sales/summary`);

      if (!summaryRes.ok) {
        throw new Error("Failed to load summary");
      }

      const summary = await summaryRes.json();

      document.getElementById("totalSales").innerText =
        "₱" + Number(summary.total_sales || 0).toFixed(2);

      document.getElementById("weeklySales").innerText =
        "₱" + Number(summary.weekly_sales || 0).toFixed(2);

      document.getElementById("monthlySales").innerText =
        "₱" + Number(summary.monthly_sales || 0).toFixed(2);

      document.getElementById("totalOrders").innerText =
        summary.total_orders || 0;

      // ================= DAILY SALES GRAPH =================
      const salesRes = await fetch(`${API}/sales/daily`);

      if (!salesRes.ok) {
        throw new Error("Failed to load graph data");
      }

      const salesData = await salesRes.json();

      // ================= LABELS =================
      const labels = salesData.map(item => {

        const d = new Date(item.date);

        return d.toLocaleDateString("en-PH", {
          month: "short",
          day: "numeric"
        });

      });

      // ================= SALES VALUES =================
      const totals = salesData.map(item =>
        Number(item.total)
      );

      // ================= CREATE CHART =================
      new Chart(document.getElementById("chart"), {

        type: "line",

        data: {

          labels: labels,

          datasets: [{
            label: "Daily Sales (₱)",
            data: totals,
            borderColor: "#fbbf24",
            backgroundColor: "rgba(251,191,36,0.2)",
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 5,
            pointBackgroundColor: "#fbbf24"
          }]
        },

        options: {

          responsive: true,
          maintainAspectRatio: false,

          plugins: {

            legend: {
              labels: {
                color: "white"
              }
            }

          },

          scales: {

            x: {
              ticks: {
                color: "white"
              },
              grid: {
                color: "rgba(255,255,255,0.08)"
              }
            },

            y: {
              beginAtZero: true,

              ticks: {
                color: "white",

                callback: function(value) {
                  return "₱" + value;
                }
              },

              grid: {
                color: "rgba(255,255,255,0.08)"
              }
            }

          }

        }

      });

    } catch (err) {

      console.error(err);

      alert("Failed to load analytics");

    }
  }

  // ================= START =================
  loadAnalytics();

  </script>

  </body>
  </html>
